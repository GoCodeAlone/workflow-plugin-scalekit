syntax = "proto3";

package workflow.plugins.scalekit.v1;

option go_package = "github.com/GoCodeAlone/workflow-plugin-scalekit/internal/contracts";

import "google/protobuf/struct.proto";

message ProviderConfig {
  string environment_url = 1;
  string client_id = 2;
  string client_secret = 3;
}

message ScalekitStepConfig {
  string module = 1;
  google.protobuf.Struct values = 2;
}

message ScalekitStepInput {
  google.protobuf.Struct values = 1;
}

message ScalekitStepOutput {
  google.protobuf.Struct values = 1;
  bool stop_pipeline = 2;
}

message AuthProviderConfigOption {
  string value = 1;
  string label = 2;
  string description = 3;
}

message AuthProviderConfigField {
  string key = 1;
  string label = 2;
  string description = 3;
  string help_text = 4;
  string input_type = 5;
  bool secret = 6;
  bool required = 7;
  repeated AuthProviderConfigOption options = 8;
  string lookup = 9;
  string validation_pattern = 10;
}

message AuthProviderCapability {
  string key = 1;
  string label = 2;
  string category = 3;
  string description = 4;
  bool supported = 5;
  string disabled_reason = 6;
  repeated string app_scopes = 7;
  repeated string admin_read_scopes = 8;
  repeated string admin_write_scopes = 9;
  repeated AuthProviderConfigField config_fields = 10;
}

message AuthProviderDescriptor {
  string id = 1;
  string label = 2;
  string description = 3;
  repeated string categories = 4;
  string implementation = 5;
  string version = 6;
  string docs_url = 7;
  string support_level = 8;
  string disabled_reason = 9;
  repeated AuthProviderCapability capabilities = 10;
}

message AuthProviderDescribeConfig {
  string provider_id = 1;
  string environment_url = 2;
}

message AuthProviderDescribeInput {
  string provider_id = 1;
  string environment_url = 2;
}

message AuthProviderDescribeOutput {
  repeated AuthProviderDescriptor providers = 1;
}
